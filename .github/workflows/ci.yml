name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: chaosprobe / lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chaosprobe
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "chaosprobe/uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: black --check
        run: uv run black --check .

      - name: ruff check
        run: uv run ruff check .

      - name: mypy (analysis CLI subset)
        run: uv run mypy

      - name: pytest
        run: uv run pytest -q
