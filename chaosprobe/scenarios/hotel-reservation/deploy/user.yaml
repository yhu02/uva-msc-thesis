# DeathStarBench hotelReservation — user (gRPC, port 8086) + mongodb-user
# Source: https://github.com/delimitrou/DeathStarBench/tree/6ecb09706140f8730b5385c08f1386c654c3c526/hotelReservation/kubernetes/user
# Upstream commit: 6ecb0970 (2024-06-27, latest commit touching hotelReservation).
# Adaptations vs upstream: `io.kompose.service` labels -> `app:` (ChaosProbe prober
# convention); images pinned by tag; explicit resources.requests; tcpSocket readiness
# probes added; kompose/istio annotations dropped; mongodb hostPath PV/PVC replaced by
# emptyDir (chaos runs need no persistence; each service re-seeds its database on boot).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  labels:
    app: user
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - name: hotel-reserv-user
          image: deathstarbench/hotel-reservation:0.3.5
          command: ["./user"]
          ports:
            - containerPort: 8086
          readinessProbe:
            initialDelaySeconds: 10
            periodSeconds: 5
            tcpSocket:
              port: 8086
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: user
  labels:
    app: user
spec:
  type: ClusterIP
  selector:
    app: user
  ports:
    - name: grpc
      port: 8086
      targetPort: 8086

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-user
  labels:
    app: mongodb-user
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-user
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mongodb-user
    spec:
      hostname: user-db
      containers:
        - name: hotel-reserv-user-mongo
          image: mongo:4.4.6
          ports:
            - containerPort: 27017
          readinessProbe:
            initialDelaySeconds: 10
            periodSeconds: 5
            tcpSocket:
              port: 27017
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - mountPath: /data/db
              name: data
      volumes:
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-user
  labels:
    app: mongodb-user
spec:
  type: ClusterIP
  selector:
    app: mongodb-user
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
