# DeathStarBench hotelReservation — frontend (HTTP entry point, Go, port 5000).
# Source: https://github.com/delimitrou/DeathStarBench/tree/6ecb09706140f8730b5385c08f1386c654c3c526/hotelReservation/kubernetes/frontend
# Upstream commit: 6ecb0970 (2024-06-27, latest commit touching hotelReservation).
# Adaptations vs upstream: `io.kompose.service` labels -> `app:` (ChaosProbe prober
# convention); image pinned to 0.3.5 (== `latest` pushed 2024-06-27, same day as the
# pinned commit); explicit resources.requests; readiness probe added; kompose/istio
# annotations dropped; frontend-external NodePort added for host-side load generation.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: hotel-reserv-frontend
          image: deathstarbench/hotel-reservation:0.3.5
          command: ["./frontend"]
          ports:
            - containerPort: 5000
          readinessProbe:
            initialDelaySeconds: 10
            periodSeconds: 5
            httpGet:
              path: /
              port: 5000
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-external
  labels:
    app: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
