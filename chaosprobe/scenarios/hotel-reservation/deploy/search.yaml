# DeathStarBench hotelReservation — search (gRPC, port 8082; calls geo + rate)
# Source: https://github.com/delimitrou/DeathStarBench/tree/6ecb09706140f8730b5385c08f1386c654c3c526/hotelReservation/kubernetes/search
# Upstream commit: 6ecb0970 (2024-06-27, latest commit touching hotelReservation).
# Adaptations vs upstream: `io.kompose.service` labels -> `app:` (ChaosProbe prober
# convention); images pinned by tag; explicit resources.requests; tcpSocket readiness
# probes added; kompose/istio annotations dropped; mongodb hostPath PV/PVC replaced by
# emptyDir (chaos runs need no persistence; each service re-seeds its database on boot).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
  labels:
    app: search
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
    spec:
      containers:
        - name: hotel-reserv-search
          image: deathstarbench/hotel-reservation:0.3.5
          command: ["/go/bin/search"]
          ports:
            - containerPort: 8082
          readinessProbe:
            initialDelaySeconds: 10
            periodSeconds: 5
            tcpSocket:
              port: 8082
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: search
  labels:
    app: search
spec:
  type: ClusterIP
  selector:
    app: search
  ports:
    - name: grpc
      port: 8082
      targetPort: 8082
