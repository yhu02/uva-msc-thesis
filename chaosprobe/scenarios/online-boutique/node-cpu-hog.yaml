# Placement Experiment — node-cpu-hog on the node hosting productcatalogservice
#
# WHY this exists (see the critical review): pod-cpu-hog cannot test the
# placement-contention hypothesis (L1 "colocate is worst", L2 "spread isolates
# best") because every container is CPU-limited to ~200m, so a pod-scoped hog is
# CFS-throttled below node saturation and never starves co-located neighbours —
# the cpu-hog scores ceiling at 100. node-cpu-hog stresses the NODE directly,
# bypassing container limits, so it creates genuine node-level contention.
#
# How it follows the placement strategy: TARGET_NODES is left "auto" and the
# runner resolves it to whichever node the active strategy placed
# productcatalogservice on (appinfo.applabel below). So:
#   - colocate  → that node hosts ALL pods → hogging it starves the whole app
#                 (large blast radius — the L1 prediction).
#   - spread    → that node hosts only ~1–3 pods → only catalog-dependent routes
#                 degrade, homepage/cart survive (the L2 isolation prediction).
# The score (catalog-dependent + independent probes) should therefore separate
# spread from colocate if the contention model holds for this fault class.
#
# Probe set is identical to pod-delete.yaml / cpu-hog.yaml so resilience scores
# are directly comparable across fault classes.
#
# Usage:
#   chaosprobe run -n online-boutique -e scenarios/online-boutique/node-cpu-hog.yaml -i 3
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: placement-node-cpuhog
spec:
  engineState: active
  appinfo:
    appns: online-boutique
    applabel: app=productcatalogservice
    appkind: deployment
  chaosServiceAccount: litmus-admin
  experiments:
    - name: node-cpu-hog
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "120"
            # Workers are 2 vCPU; stress both cores at full load to saturate
            # the node and force real contention among whatever pods live there.
            - name: NODE_CPU_CORE
              value: "2"
            - name: CPU_LOAD
              value: "100"
            # "auto" → resolved by the runner to the node hosting applabel above
            # (per-strategy). Replace with a node name to pin it manually.
            - name: TARGET_NODES
              value: "auto"
        probe:
          # ── Tier 1: Strict probes (3s timeout, 1 retry ≈ 6s) ──────
          - name: frontend-product-strict
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/product/OLJCESPC7Z
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 3s
              interval: 2s
              retry: 1

          - name: frontend-homepage-strict
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 3s
              interval: 2s
              retry: 1

          # ── Tier 2: Moderate-tight (3s timeout, 4 retries ≈ 15s) ─
          - name: frontend-homepage-moderate
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 3s
              interval: 5s
              retry: 4

          - name: frontend-product-moderate
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/product/OLJCESPC7Z
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 3s
              interval: 5s
              retry: 4

          # ── Tier 3: Moderate-loose (5s timeout, 4 retries ≈ 20s) ─
          - name: frontend-cart
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/cart
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 5s
              interval: 6s
              retry: 4

          - name: frontend-homepage-loose
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 5s
              interval: 6s
              retry: 4

          # ── Tier 4: Control probe ──────────────────────────────────
          - name: frontend-healthz
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/_healthz
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 5s
              interval: 4s
              retry: 3

          # ── Rust cmdProbes ──────────────────────────────────────────
          - name: check-redis
            type: cmdProbe
            mode: Edge
            cmdProbe/inputs:
              command: /probe/check-redis
              comparator:
                type: string
                criteria: contains
                value: "REDIS_OK"
              source:
                image: auto
                imagePullSecrets:
                  - name: chaosprobe-registry
            runProperties:
              probeTimeout: 3s
              interval: 5s
              retry: 0

          - name: check-http-latency
            type: cmdProbe
            mode: Continuous
            cmdProbe/inputs:
              command: /probe/check-http-latency
              comparator:
                type: string
                criteria: contains
                value: "LATENCY_OK"
              source:
                image: auto
                imagePullSecrets:
                  - name: chaosprobe-registry
            runProperties:
              probeTimeout: 8s
              interval: 12s
              retry: 6

          - name: check-dns-latency
            type: cmdProbe
            mode: Continuous
            cmdProbe/inputs:
              command: /probe/check-dns-latency
              comparator:
                type: string
                criteria: contains
                value: "DNS_OK"
              source:
                image: auto
                imagePullSecrets:
                  - name: chaosprobe-registry
            runProperties:
              probeTimeout: 3s
              interval: 5s
              retry: 2

          - name: check-tcp-connect
            type: cmdProbe
            mode: Edge
            cmdProbe/inputs:
              command: /probe/check-tcp-connect
              comparator:
                type: string
                criteria: contains
                value: "TCP_OK"
              source:
                image: auto
                imagePullSecrets:
                  - name: chaosprobe-registry
            runProperties:
              probeTimeout: 3s
              interval: 5s
              retry: 0

          - name: check-cart-flow
            type: cmdProbe
            mode: Edge
            cmdProbe/inputs:
              command: /probe/check-cart-flow
              comparator:
                type: string
                criteria: contains
                value: "FLOW_OK"
              source:
                image: auto
                imagePullSecrets:
                  - name: chaosprobe-registry
            runProperties:
              probeTimeout: 10s
              interval: 5s
              retry: 1
