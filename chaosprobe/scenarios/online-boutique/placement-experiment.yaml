# Placement Experiment — Pod-delete on productcatalogservice
# Used by all placement strategies (baseline, default, colocate, spread, adversarial, random, best-fit, dependency-aware).
# The runner adds a unique suffix to metadata.name automatically.
#
# Usage (automated):
#   chaosprobe run -n online-boutique
#
# Usage (manual):
#   chaosprobe placement apply colocate -n online-boutique
#   chaosprobe run scenarios/online-boutique/placement-experiment.yaml -o colocate.json
#   chaosprobe placement clear -n online-boutique
#
# Hypothesis: Microservice resilience under chaos varies with pod placement
# strategy due to differences in resource contention on co-located nodes.
# Measured via: pod recovery time, inter-service latency, Redis/disk I/O
# throughput, node resource utilisation, and cascade propagation depth.
#
# Target: productcatalogservice — a central dependency for homepage, product
# pages, recommendations, and search. Killing it causes visible degradation
# across multiple frontend routes.
#
# Probes test collateral damage via frontend routes that depend on
# productcatalogservice. Under colocate, pod-delete churn creates node-level
# resource contention that degrades co-located services and slows recovery.
#
# Probe design rationale (7 probes for granular resilience scoring):
#
#   Continuous probes run every few seconds throughout chaos. A SINGLE failed
#   check (after retries) marks the entire probe as "Failed". This makes the
#   probe mode and retry/timeout settings critical for differentiation.
#
#   We use 4 sensitivity tiers so that different recovery speeds produce
#   different scores:
#
#   Tier 1 — Strict (2 probes): 3s timeout, 1 retry ≈ 6s window.
#     Expected to fail under pod-delete; confirm chaos has impact.
#
#   Tier 2 — Moderate-tight (2 probes): 3s timeout, 2 retries ≈ 9s window.
#     Pass only when recovery is fast (<3s per check window).
#
#   Tier 3 — Moderate-loose (2 probes): 5s timeout, 3 retries ≈ 20s window.
#     Pass when recovery is moderate (<5s); catches slow strategies.
#
#   Tier 4 — Control (1 probe): healthz endpoint, 5s timeout, 3 retries.
#     Detects node-level contention that affects even local endpoints.
#
#   With 7 probes, resilience scores can be: 0, 14, 28, 42, 57, 71, 85, 100%.
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: placement-pod-delete
spec:
  engineState: active
  appinfo:
    appns: online-boutique
    applabel: app=productcatalogservice
    appkind: deployment
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "120"
            - name: CHAOS_INTERVAL
              value: "5"
            - name: FORCE
              value: "true"
            - name: PODS_AFFECTED_PERC
              value: "100"
        probe:
          # ── Tier 1: Strict probes (3s timeout, 1 retry ≈ 6s) ──────
          # Expected to fail under 100% pod-delete. Confirm chaos impact.

          # Probe 1: Product page (strict) — directly depends on productcatalog.
          - name: frontend-product-strict
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/product/OLJCESPC7Z
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 3s
              interval: 2s
              retry: 1

          # Probe 2: Homepage (strict) — depends on productcatalog + recommendation + ad.
          - name: frontend-homepage-strict
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 3s
              interval: 2s
              retry: 1

          # ── Tier 2: Moderate-tight probes (3s timeout, 2 retries ≈ 9s) ─
          # Pass only when recovery is fast (<3s). This tier differentiates
          # fast-recovering strategies (spread, dependency-aware) from slow ones.

          # Probe 3: Homepage (moderate-tight)
          - name: frontend-homepage-moderate
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 3s
              interval: 3s
              retry: 2

          # Probe 4: Product page (moderate-tight) — same tier, different route.
          - name: frontend-product-moderate
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/product/OLJCESPC7Z
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 3s
              interval: 3s
              retry: 2

          # ── Tier 3: Moderate-loose probes (5s timeout, 3 retries ≈ 20s) ─
          # Pass when recovery is moderate. Catches strategies with slow
          # recovery (>5s) that might still pass tier 2.

          # Probe 5: Cart page (moderate-loose) — hits cartservice + redis,
          # NOT productcatalog. Fails under colocate/adversarial where
          # node-level resource contention degrades unrelated routes.
          - name: frontend-cart
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/cart
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 5s
              interval: 4s
              retry: 3

          # Probe 6: Homepage (moderate-loose) — generous tolerance catches
          # only the slowest recovery strategies.
          - name: frontend-homepage-loose
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 5s
              interval: 4s
              retry: 3

          # ── Tier 4: Control probe ──────────────────────────────────
          # The /_healthz endpoint is served locally by the frontend and
          # does NOT call any backend service. Failure indicates severe
          # node-level resource pressure (CPU/memory contention).

          # Probe 7: Healthcheck (control) — pure infrastructure health.
          - name: frontend-healthz
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/_healthz
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 5s
              interval: 4s
              retry: 3
