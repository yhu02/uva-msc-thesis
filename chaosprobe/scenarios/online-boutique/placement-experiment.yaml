# Placement Experiment — Pod-delete on productcatalogservice
# Used by all placement strategies (baseline, default, colocate, spread, adversarial, random, best-fit, dependency-aware).
# The runner adds a unique suffix to metadata.name automatically.
#
# Usage (automated):
#   chaosprobe run -n online-boutique
#
# Usage (manual):
#   chaosprobe placement apply colocate -n online-boutique
#   chaosprobe run scenarios/online-boutique/placement-experiment.yaml -o colocate.json
#   chaosprobe placement clear -n online-boutique
#
# Hypothesis: Microservice resilience under chaos varies with pod placement
# strategy due to differences in resource contention on co-located nodes.
# Measured via: pod recovery time, inter-service latency, Redis/disk I/O
# throughput, node resource utilisation, and cascade propagation depth.
#
# Target: productcatalogservice — a central dependency for homepage, product
# pages, recommendations, and search. Killing it causes visible degradation
# across multiple frontend routes.
#
# Probes test collateral damage via frontend routes that depend on
# productcatalogservice. Under colocate, pod-delete churn creates node-level
# resource contention that degrades co-located services and slows recovery.
#
# Probe design rationale (6 probes for granular resilience scoring):
#
#   Continuous probes run every few seconds throughout chaos. A SINGLE failed
#   check (after retries) marks the entire probe as "Failed". This makes the
#   probe mode and retry/timeout settings critical for differentiation.
#
#   We use a layered strategy with a spread of sensitivities so that
#   different recovery speeds produce different scores:
#   - 2 strict probes (3s timeout, 1 retry ≈ 6s window) — expected to
#     fail under pod-delete; confirm that chaos has impact.
#   - 2 moderate probes (3-5s timeout, 2 retries ≈ 9-15s window) — pass
#     only when recovery is fast (<3s); this is where strategy
#     differences become visible.
#   - 1 Edge probe (checks only at start + end) — validates eventual
#     recovery after chaos stops.
#   - 1 control probe (healthz, 5s timeout, 2 retries ≈ 15s) — detects
#     node-level contention that affects local endpoints.
#
#   With 6 probes, resilience scores can be: 0, 17, 33, 50, 67, 83, or 100%.
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: placement-pod-delete
spec:
  engineState: active
  appinfo:
    appns: online-boutique
    applabel: app=productcatalogservice
    appkind: deployment
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "120"
            - name: CHAOS_INTERVAL
              value: "5"
            - name: FORCE
              value: "true"
            - name: PODS_AFFECTED_PERC
              value: "100"
        probe:
          # ── Strict probes ───────────────────────────────────────────
          # These are expected to fail under 100% pod-delete. They confirm
          # that killing productcatalogservice actually causes disruption.

          # Probe 1: Product page (strict) — directly depends on productcatalog.
          # With 3s timeout and 1 retry, tolerates normal cluster jitter but
          # still catches pod-delete disruption (multi-second outages). Over
          # 120s with 2s interval (~60 checks), near-certain to catch at least one.
          - name: frontend-product-strict
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/product/OLJCESPC7Z
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 3s
              interval: 2s
              retry: 1

          # Probe 2: Homepage (strict) — depends on productcatalog + recommendation + ad.
          # Same settings as above.
          - name: frontend-homepage-strict
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 3s
              interval: 2s
              retry: 1

          # ── Moderate probes ─────────────────────────────────────────
          # These have enough tolerance to absorb a fast (<3s) recovery
          # but NOT a slow one. With CHAOS_INTERVAL=5 the pod is deleted
          # every 5s; a strategy that recovers in <3s will pass these,
          # while one that takes >3s will fail — this is where placement
          # differences become visible.

          # Probe 3: Homepage (moderate) — same endpoint as the strict
          # probe but with 2 retries × 3s = ~9s total window per check.
          # The 3s interval gives ~40 check windows over 120s of chaos,
          # making it likely to catch recoveries slower than ~3s.
          - name: frontend-homepage-moderate
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 3s
              interval: 3s
              retry: 2

          # Probe 4: Cart page (moderate control) — hits cartservice +
          # redis, NOT productcatalog. Should pass under spread/default
          # but fail under colocate/adversarial where node-level resource
          # contention from pod-delete churn degrades unrelated routes.
          # Moderate tolerance: 2 retries × 5s = ~15s window.
          - name: frontend-cart
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/cart
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 5s
              interval: 4s
              retry: 2

          # ── Edge probe ──────────────────────────────────────────────
          # Checks only at the START and END of chaos. Validates that the
          # system recovers after chaos stops. Should pass for all strategies
          # that achieve eventual recovery.

          # Probe 5: Homepage (edge) — verifies steady-state before chaos
          # starts and confirms recovery after chaos ends.
          - name: frontend-homepage-edge
            type: httpProbe
            mode: Edge
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 15s
              interval: 5s
              retry: 5

          # ── Healthcheck probe ───────────────────────────────────────
          # The /_healthz endpoint is served locally by the frontend and
          # does NOT call any backend service. It should pass unless the
          # frontend pod itself is under severe resource pressure (CPU/memory
          # contention on the node).

          # Probe 6: Healthcheck (control) — pure infrastructure health.
          # Failure here indicates the placement strategy causes so much
          # node-level contention that even local endpoints are degraded.
          # Moderate tolerance (5s × 2 retries ≈ 15s) — tight enough to
          # detect sustained node pressure from colocated pod churn.
          - name: frontend-healthz
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/_healthz
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 5s
              interval: 4s
              retry: 2
