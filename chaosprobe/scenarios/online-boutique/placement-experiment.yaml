# Placement Experiment — Pod-delete on productcatalogservice
# Used by all placement strategies (baseline, colocate, spread, antagonistic, random).
# The runner adds a unique suffix to metadata.name automatically.
#
# Usage (automated):
#   chaosprobe run-all -n online-boutique
#
# Usage (manual):
#   chaosprobe placement apply colocate -n online-boutique
#   chaosprobe run scenarios/online-boutique/placement-experiment.yaml -o colocate.json
#   chaosprobe placement clear -n online-boutique
#
# Hypothesis: Pod scheduling recovery time varies with placement strategy due
# to differences in resource contention on the target node.
#
# Target: productcatalogservice — a central dependency for homepage, product
# pages, recommendations, and search. Killing it causes visible degradation
# across multiple frontend routes.
#
# Probes test collateral damage via frontend routes that depend on
# productcatalogservice. Under colocate, pod-delete churn creates node-level
# resource contention that degrades co-located services and slows recovery.
#
# Probe design rationale (6 probes for granular resilience scoring):
#
#   Continuous probes run every few seconds throughout chaos. A SINGLE failed
#   check (after retries) marks the entire probe as "Failed". This makes the
#   probe mode and retry/timeout settings critical for differentiation.
#
#   We use a layered strategy:
#   - 2 strict probes (short timeout, few retries) that are expected to fail
#     when productcatalog is down — these confirm the chaos has impact.
#   - 2 tolerant probes (long timeout, many retries) that can absorb the
#     ~1-2s recovery window — these differentiate fast-recovery strategies.
#   - 1 Edge probe (checks only at start + end) — validates the system
#     recovers after chaos stops.
#   - 1 control probe (independent endpoint) — detects node-level contention
#     that affects co-located services unrelated to the killed dependency.
#
#   With 6 probes, resilience scores can be: 0, 17, 33, 50, 67, 83, or 100%.
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: placement-pod-delete
spec:
  engineState: active
  appinfo:
    appns: online-boutique
    applabel: app=productcatalogservice
    appkind: deployment
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "120"
            - name: CHAOS_INTERVAL
              value: "10"
            - name: FORCE
              value: "true"
            - name: PODS_AFFECTED_PERC
              value: "100"
        probe:
          # ── Strict probes ───────────────────────────────────────────
          # These are expected to fail under 100% pod-delete. They confirm
          # that killing productcatalogservice actually causes disruption.

          # Probe 1: Product page (strict) — directly depends on productcatalog.
          # With 5s timeout and 2 retries, this probe is very sensitive to any
          # outage window. Expected to fail for all strategies.
          - name: frontend-product-strict
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/product/OLJCESPC7Z
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 5s
              interval: 2s
              retry: 2

          # Probe 2: Homepage (strict) — depends on productcatalog + recommendation + ad.
          # Same tight settings as above.
          - name: frontend-homepage-strict
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 5s
              interval: 2s
              retry: 2

          # ── Tolerant probes ─────────────────────────────────────────
          # These absorb the recovery window (~1-2s). If the strategy
          # allows fast recovery, the retries succeed before the probe
          # gives up. This is where strategy differences become visible.

          # Probe 3: Homepage (tolerant) — same endpoint but with generous
          # retries. Each check gets up to 5 attempts × 10s = 50s to succeed.
          # The 5s interval means fewer check windows, reducing the chance of
          # catching a transient failure.
          - name: frontend-homepage-tolerant
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 10s
              interval: 5s
              retry: 4

          # Probe 4: Cart page (control) — hits cartservice + redis, NOT
          # productcatalog. This probe should pass unless node-level resource
          # contention (from pod-delete churn on the same node) degrades the
          # frontend's ability to serve unrelated routes.
          # Generous timeout to avoid false negatives from transient load.
          - name: frontend-cart
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/cart
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 10s
              interval: 5s
              retry: 3

          # ── Edge probe ──────────────────────────────────────────────
          # Checks only at the START and END of chaos. Validates that the
          # system recovers after chaos stops. Should pass for all strategies
          # that achieve eventual recovery.

          # Probe 5: Homepage (edge) — verifies steady-state before chaos
          # starts and confirms recovery after chaos ends.
          - name: frontend-homepage-edge
            type: httpProbe
            mode: Edge
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 15s
              interval: 5s
              retry: 5

          # ── Healthcheck probe ───────────────────────────────────────
          # The /_healthz endpoint is served locally by the frontend and
          # does NOT call any backend service. It should pass unless the
          # frontend pod itself is under severe resource pressure (CPU/memory
          # contention on the node).

          # Probe 6: Healthcheck (control) — pure infrastructure health.
          # Failure here indicates the placement strategy causes so much
          # node-level contention that even local endpoints are degraded.
          - name: frontend-healthz
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/_healthz
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 10s
              interval: 5s
              retry: 3
