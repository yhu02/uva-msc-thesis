# Placement Experiment — node-drain on the node hosting productcatalogservice
#
# WHY this exists (roadmap P1/P3): this is the *node-level failure* fault that
# topology-spread / anti-affinity actually exists for. Draining a worker evicts
# every pod on it, so placement decides the blast radius — and it is most telling
# with MULTI-REPLICA services (run with `--replicas 3`):
#   - colocate  → all replicas of a service share the drained node → full
#                 per-service outage (the failure-domain risk).
#   - spread    → at most one replica per service is on the drained node → the
#                 service stays up on the others (the isolation P3 predicts).
# At single replica both lose the only pod, so the user-visible difference appears
# only once services are replicated — which is the boundary P1 measures.
#
# Target follows the placement strategy: TARGET_NODE is left "auto" and the runner
# resolves it (singular env — node-drain reads TARGET_NODE, not TARGET_NODES) to
# whichever node the active strategy placed productcatalogservice on.
#
# Probe set is identical to node-cpu-hog.yaml so scores are comparable.
#
# Usage:
#   chaosprobe run -n online-boutique -s spread,colocate \
#     -e scenarios/online-boutique/node-drain.yaml --replicas 3 -i 4
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: placement-node-drain
spec:
  engineState: active
  appinfo:
    appns: online-boutique
    applabel: app=productcatalogservice
    appkind: deployment
  chaosServiceAccount: litmus-admin
  experiments:
    - name: node-drain
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "120"
            # "auto" → resolved by the runner to the node hosting applabel above
            # (per-strategy). node-drain reads the SINGULAR TARGET_NODE. Replace
            # with a node name to pin it manually.
            - name: TARGET_NODE
              value: "auto"
        probe:
          # ── Tier 1: Strict probes (3s timeout, 1 retry ≈ 6s) ──────
          - name: frontend-product-strict
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/product/OLJCESPC7Z
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 3s
              interval: 2s
              retry: 1

          - name: frontend-homepage-strict
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 3s
              interval: 2s
              retry: 1

          # ── Tier 2: Moderate-tight (3s timeout, 4 retries ≈ 15s) ─
          - name: frontend-homepage-moderate
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 3s
              interval: 5s
              retry: 4

          - name: frontend-product-moderate
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/product/OLJCESPC7Z
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 3s
              interval: 5s
              retry: 4

          # ── Tier 3: Moderate-loose (5s timeout, 4 retries ≈ 20s) ─
          - name: frontend-cart
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/cart
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 5s
              interval: 6s
              retry: 4

          - name: frontend-homepage-loose
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 5s
              interval: 6s
              retry: 4

          # ── Tier 4: Control probe ──────────────────────────────────
          - name: frontend-healthz
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://frontend.online-boutique.svc.cluster.local/_healthz
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            runProperties:
              probeTimeout: 5s
              interval: 4s
              retry: 3

          # ── Rust cmdProbes ──────────────────────────────────────────
          - name: check-redis
            type: cmdProbe
            mode: Edge
            cmdProbe/inputs:
              command: /probe/check-redis
              comparator:
                type: string
                criteria: contains
                value: "REDIS_OK"
              source:
                image: auto
                imagePullSecrets:
                  - name: chaosprobe-registry
            runProperties:
              probeTimeout: 3s
              interval: 5s
              retry: 0

          - name: check-http-latency
            type: cmdProbe
            mode: Continuous
            cmdProbe/inputs:
              command: /probe/check-http-latency
              comparator:
                type: string
                criteria: contains
                value: "LATENCY_OK"
              source:
                image: auto
                imagePullSecrets:
                  - name: chaosprobe-registry
            runProperties:
              probeTimeout: 8s
              interval: 12s
              retry: 6

          - name: check-dns-latency
            type: cmdProbe
            mode: Continuous
            cmdProbe/inputs:
              command: /probe/check-dns-latency
              comparator:
                type: string
                criteria: contains
                value: "DNS_OK"
              source:
                image: auto
                imagePullSecrets:
                  - name: chaosprobe-registry
            runProperties:
              probeTimeout: 3s
              interval: 5s
              retry: 2

          - name: check-tcp-connect
            type: cmdProbe
            mode: Edge
            cmdProbe/inputs:
              command: /probe/check-tcp-connect
              comparator:
                type: string
                criteria: contains
                value: "TCP_OK"
              source:
                image: auto
                imagePullSecrets:
                  - name: chaosprobe-registry
            runProperties:
              probeTimeout: 3s
              interval: 5s
              retry: 0

          - name: check-cart-flow
            type: cmdProbe
            mode: Edge
            cmdProbe/inputs:
              command: /probe/check-cart-flow
              comparator:
                type: string
                criteria: contains
                value: "FLOW_OK"
              source:
                image: auto
                imagePullSecrets:
                  - name: chaosprobe-registry
            runProperties:
              probeTimeout: 10s
              interval: 5s
              retry: 1
